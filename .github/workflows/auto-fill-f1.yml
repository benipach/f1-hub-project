on:
  schedule:
    # Corre cada 15 min solo vie/sab/dom
    - cron: "0,30 * * * 5,6,0"
  workflow_dispatch:

jobs:
  update-season:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check if any session ended in the last 15 min
        id: check
        run: |
          node -e "
            const data = require('./data/season2026.json');
            const now = Date.now();
            const window = 15 * 60 * 1000;
            const grace = 45 * 60 * 1000; // 45 min después del endDate
            const shouldRun = Object.values(data).some(gp =>
              Object.values(gp.sessions).some(s => {
                const end = new Date(s.endDate).getTime() + grace;
                return end > now - window && end <= now;
              })
            );
            console.log('should_run=' + shouldRun);
          " >> $GITHUB_OUTPUT

      - name: Run OpenF1 auto fill
        if: steps.check.outputs.should_run == 'true'
        run: node auto-fill-missing.js data/season2026.json --year=2026 --once --weather --skip=bahrain-gp,saudi-arabian-gp

      - name: Commit changes
        if: steps.check.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/season2026.json
          git diff --cached --quiet || git commit -m "Auto update F1 session data"
          git push